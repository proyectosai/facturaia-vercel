name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Local hardening suite
        run: npm run test:massive-local

      - name: Build demo
        run: npm run demo:build

      - name: Smoke demo
        run: npm run test:smoke

  local-e2e-core:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Local browser E2E (core)
        run: npm run test:e2e:local
        env:
          FACTURAIA_E2E_SCOPE: core
          FACTURAIA_E2E_ARTIFACT_DIR: .artifacts/local-e2e-core

      - name: Upload core E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-e2e-core-artifacts
          path: .artifacts/local-e2e-core
          if-no-files-found: ignore

  local-e2e-mobile:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Local browser E2E (mobile)
        run: npm run test:e2e:local
        env:
          FACTURAIA_E2E_SCOPE: mobile
          FACTURAIA_E2E_ARTIFACT_DIR: .artifacts/local-e2e-mobile

      - name: Upload mobile E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-e2e-mobile-artifacts
          path: .artifacts/local-e2e-mobile
          if-no-files-found: ignore
